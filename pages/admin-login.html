<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>시스템 관리자 로그인 — 선거 워룸</title>
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/responsive.css">
  <style>
    body {
      margin: 0;
      background: var(--bg-primary);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .login-card {
      background: linear-gradient(145deg, var(--bg-primary), var(--bg-secondary));
      border: 2px solid var(--primary-color);
      border-radius: 12px;
      padding: 40px 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary-color);
      margin-bottom: 8px;
    }

    .login-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-primary);
      font-size: 14px;
    }

    .form-input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 14px;
      background: var(--bg-primary);
      color: var(--text-primary);
      box-sizing: border-box;
      transition: border-color 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 2px rgba(25, 83, 124, 0.1);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 10px;
    }

    .btn-login:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(25, 83, 124, 0.2);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      margin-top: 15px;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-weight: 600;
      font-size: 13px;
      display: none;
    }

    .message.show {
      display: block;
    }

    .message.success {
      background: rgba(76, 175, 80, 0.1);
      color: #4caf50;
      border: 1px solid #4caf50;
    }

    .message.error {
      background: rgba(244, 67, 54, 0.1);
      color: #f44336;
      border: 1px solid #f44336;
    }

    .loading {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-title">👨‍💼 시스템 관리자</div>
        <div class="login-subtitle">관리자 로그인</div>
      </div>

      <form id="adminLoginForm">
        <div class="form-group">
          <label class="form-label">👤 사용자명 또는 이메일</label>
          <input
            type="text"
            class="form-input"
            id="adminUsername"
            placeholder="admin_user 또는 admin@example.com"
            required
            autocomplete="username"
          >
        </div>

        <div class="form-group">
          <label class="form-label">🔐 비밀번호</label>
          <input
            type="password"
            class="form-input"
            id="adminPassword"
            placeholder="비밀번호"
            required
            autocomplete="current-password"
          >
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          로그인
        </button>
      </form>

      <div id="message" class="message"></div>
    </div>
  </div>

  <script src="/js/supabase-client.js"></script>
  <script src="/js/admin-auth.js"></script>
  <script>
    const AdminLogin = {
      async init() {
        document.getElementById('adminLoginForm').addEventListener('submit', (e) => this.handleLogin(e));

        // 이미 로그인된 경우 대시보드로 리다이렉트
        if (AdminAuth.isAuthenticated()) {
          window.location.href = '/pages/admin-dashboard.html';
        }
      },

      async handleLogin(e) {
        e.preventDefault();

        const username = document.getElementById('adminUsername').value.trim();
        const password = document.getElementById('adminPassword').value;
        const messageEl = document.getElementById('message');
        const loginBtn = document.getElementById('loginBtn');

        if (!username || !password) {
          this.showMessage('사용자명과 비밀번호를 입력해주세요.', 'error');
          return;
        }

        // 로딩 상태
        loginBtn.disabled = true;
        const originalText = loginBtn.textContent;
        loginBtn.innerHTML = '<span class="loading"></span>로그인 중...';

        try {
          const result = await AdminAuth.login(username, password);

          if (result.success) {
            this.showMessage(result.message, 'success');
            setTimeout(() => {
              window.location.href = '/pages/admin-dashboard.html';
            }, 500);
          } else {
            this.showMessage(result.message, 'error');
            loginBtn.disabled = false;
            loginBtn.textContent = originalText;
          }
        } catch (err) {
          console.error('로그인 오류:', err);
          this.showMessage('❌ 오류: ' + err.message, 'error');
          loginBtn.disabled = false;
          loginBtn.textContent = originalText;
        }
      },

      showMessage(text, type) {
        const messageEl = document.getElementById('message');
        messageEl.textContent = text;
        messageEl.className = `message show ${type}`;
      }
    };

    AdminLogin.init();
  </script>
</body>
</html>
