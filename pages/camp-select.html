<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>캠프 선택 → 로그인 리다이렉트</title>
  <link rel="preload" href="../css/theme.css" as="style">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-light) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-family-base);
    }

    .container {
      background: white;
      border-radius: var(--radius-lg);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 60px 40px;
      max-width: 500px;
      width: 90%;
      text-align: center;
    }

    .logo {
      font-size: 64px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 32px;
      color: var(--text-primary);
      margin-bottom: 12px;
      font-weight: 700;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .input-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
      text-align: left;
      font-size: 14px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: var(--radius-md);
      font-size: 16px;
      font-family: var(--font-family-base);
      transition: all var(--transition-base);
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--primary-color);
      background-color: rgba(59, 130, 246, 0.02);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    button {
      flex: 1;
      padding: 12px 24px;
      border: none;
      border-radius: var(--radius-md);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-base);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background-color: #f3f4f6;
      color: var(--text-primary);
      border: 1px solid #e0e0e0;
    }

    .btn-secondary:hover {
      background-color: #e5e7eb;
    }

    .message {
      padding: 12px 16px;
      border-radius: var(--radius-md);
      margin-bottom: 16px;
      font-size: 14px;
      display: none;
    }

    .message.success {
      background-color: #d1fae5;
      color: #047857;
      border: 1px solid #6ee7b7;
      display: block;
    }

    .message.error {
      background-color: #fee2e2;
      color: #dc2626;
      border: 1px solid #fca5a5;
      display: block;
    }

    .help-text {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 12px;
      line-height: 1.6;
    }

    .admin-link {
      margin-top: 40px;
      padding-top: 40px;
      border-top: 1px solid #e0e0e0;
    }

    .admin-link p {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .btn-admin {
      display: inline-block;
      padding: 8px 20px;
      background-color: #f3f4f6;
      color: var(--text-primary);
      border: 1px solid #e0e0e0;
      border-radius: var(--radius-md);
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      transition: all var(--transition-base);
    }

    .btn-admin:hover {
      background-color: #e5e7eb;
      border-color: var(--primary-color);
      color: var(--primary-color);
    }

    @media (max-width: 480px) {
      .container {
        padding: 40px 24px;
      }

      h1 {
        font-size: 24px;
      }

      .button-group {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🗳️</div>

    <h1>선거 워룸</h1>
    <p class="subtitle">AI 정치 전략 플랫폼</p>

    <div class="message" id="message"></div>

    <div class="input-group">
      <label for="campCode">캠프 코드 입력</label>
      <input
        type="text"
        id="campCode"
        placeholder="예: kim-dongjaek-2024"
        autocomplete="off"
      />
      <p class="help-text">
        📌 캠프 리더에게 받은 캠프 코드를 입력하세요.<br/>
        그러면 자료와 정보를 모두 볼 수 있습니다.
      </p>
    </div>

    <div class="button-group">
      <button class="btn-primary" onclick="enterCamp()">입장</button>
      <button class="btn-secondary" onclick="clearInput()">초기화</button>
    </div>

    <div class="admin-link">
      <p>🔐 캠프 리더인가요?</p>
      <a href="admin.html" class="btn-admin">관리자 대시보드</a>
    </div>
  </div>

  <script>
    // 로그인 기반 모델로 변경됨 - login.html로 리다이렉트
    window.addEventListener('DOMContentLoaded', () => {
      window.location.href = 'login.html';
    });

    /**
     * 캠프 입장
     */
    async function enterCamp() {
      const campCode = campCodeInput.value.trim();

      if (!campCode) {
        showMessage('❌ 캠프 코드를 입력해주세요.', 'error');
        campCodeInput.focus();
        return;
      }

      try {
        // Supabase에서 해당 캠프 존재 여부 확인
        if (!window.supabase) {
          showMessage('❌ 시스템 초기화 중입니다. 잠시만 기다려주세요.', 'error');
          return;
        }

        const { data, error } = await window.supabase
          .from('candidates')
          .select('id, name')
          .eq('camp_code', campCode)
          .eq('is_active', true)
          .single();

        if (error || !data) {
          showMessage('❌ 존재하지 않는 캠프 코드입니다.', 'error');
          campCodeInput.focus();
          return;
        }

        // 캠프 존재 → 대시보드로 이동
        showMessage(`✅ ${data.name} 캠프로 입장합니다...`, 'success');
        setTimeout(() => {
          window.location.href = `/pages/dashboard.html?camp=${encodeURIComponent(campCode)}`;
        }, 1000);
      } catch (err) {
        console.error('❌ 오류:', err);
        showMessage('❌ 연결 오류가 발생했습니다. 다시 시도해주세요.', 'error');
      }
    }

    /**
     * 입력 초기화
     */
    function clearInput() {
      campCodeInput.value = '';
      messageDiv.textContent = '';
      messageDiv.className = 'message';
      campCodeInput.focus();
    }

    /**
     * 메시지 표시
     */
    function showMessage(text, type) {
      messageDiv.textContent = text;
      messageDiv.className = `message ${type}`;
    }
  </script>

  <!-- Supabase 클라이언트 로드 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Supabase 초기화 (환경 변수에서 읽기)
    const supabaseUrl = localStorage.getItem('supabaseUrl');
    const supabaseKey = localStorage.getItem('supabaseKey');

    if (supabaseUrl && supabaseKey) {
      window.supabase = window.supabase?.createClient(supabaseUrl, supabaseKey) ||
        supabase.createClient(supabaseUrl, supabaseKey);
    } else {
      console.warn('⚠️ Supabase 설정이 필요합니다.');
      document.querySelector('.message').textContent = '⚠️ Supabase 설정이 필요합니다. 시스템 관리자에게 연락하세요.';
      document.querySelector('.message').className = 'message error';
    }
  </script>
</body>
</html>
