<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>시스템 관리자 대시보드 — 선거 워룸</title>
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/responsive.css">
  <style>
    body { margin: 0; background: var(--bg-primary); }
    .admin-dashboard {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid var(--border-color);
    }
    .header-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--primary-color);
    }
    .admin-info {
      display: flex;
      gap: 15px;
      align-items: center;
    }
    .admin-profile {
      background: var(--bg-secondary);
      padding: 10px 15px;
      border-radius: 8px;
      font-size: 14px;
    }
    .btn-logout {
      padding: 10px 20px;
      background: #f44336;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: linear-gradient(145deg, var(--bg-primary), var(--bg-secondary));
      padding: 20px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
    }
    .stat-label {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--primary-color);
    }
    .campaigns-section {
      background: linear-gradient(145deg, var(--bg-primary), var(--bg-secondary));
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
    }
    .section-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 20px;
    }
    .campaign-item {
      background: var(--bg-primary);
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid var(--border-color);
    }
    .campaign-info {
      flex: 1;
    }
    .campaign-name {
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 5px;
    }
    .campaign-meta {
      font-size: 12px;
      color: var(--text-secondary);
    }
    .status-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-right: 10px;
    }
    .status-pending {
      background: rgba(255, 193, 7, 0.2);
      color: #ffc107;
    }
    .status-approved {
      background: rgba(76, 175, 80, 0.2);
      color: #4caf50;
    }
    .status-rejected {
      background: rgba(244, 67, 54, 0.2);
      color: #f44336;
    }
    .action-buttons {
      display: flex;
      gap: 8px;
    }
    .btn-action {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-approve {
      background: #4caf50;
      color: white;
    }
    .btn-approve:hover {
      background: #45a049;
    }
    .btn-reject {
      background: #f44336;
      color: white;
    }
    .btn-reject:hover {
      background: #da190b;
    }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="admin-dashboard">
    <!-- 헤더 -->
    <div class="header">
      <div class="header-title">👨‍💼 시스템 관리자 대시보드</div>
      <div class="admin-info">
        <div class="admin-profile">
          <div id="adminUsername">로딩 중...</div>
          <div style="font-size: 12px; color: var(--text-secondary);" id="adminRole"></div>
        </div>
        <button class="btn-logout" onclick="AdminDashboard.logout()">🚪 로그아웃</button>
      </div>
    </div>

    <!-- 통계 -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">📊 총 캠프</div>
        <div class="stat-value" id="totalCampaigns">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">⏳ 대기 중</div>
        <div class="stat-value" id="pendingCampaigns">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">✅ 승인됨</div>
        <div class="stat-value" id="approvedCampaigns">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">❌ 거부됨</div>
        <div class="stat-value" id="rejectedCampaigns">0</div>
      </div>
    </div>

    <!-- 캠프 관리 -->
    <div class="campaigns-section">
      <div class="section-title">🏛️ 캠프 관리</div>
      <div id="campaignsList"></div>
    </div>
  </div>

  <script src="/js/supabase-client.js"></script>
  <script src="/js/admin-auth.js"></script>
  <script>
    const AdminDashboard = {
      async init() {
        // 인증 확인
        if (!AdminAuth.isAuthenticated()) {
          window.location.href = '/pages/admin-login.html';
          return;
        }

        // 관리자 정보 표시
        const admin = AdminAuth.getCurrentAdmin();
        document.getElementById('adminUsername').textContent = admin.username;
        document.getElementById('adminRole').textContent = admin.role === 'super_admin' ? '🔴 Super Admin' : '🟠 Admin';

        // Supabase 초기화
        await SupabaseDB.init();

        // 데이터 로드
        this.loadStatistics();
        this.loadCampaigns();

        // 실시간 업데이트 (옵션)
        setInterval(() => this.loadCampaigns(), 5000);
      },

      async loadStatistics() {
        try {
          const { data, error } = await SupabaseDB.client
            .from('candidates')
            .select('approval_status');

          if (error) throw error;

          const total = data.length;
          const pending = data.filter(c => !c.approval_status || c.approval_status === 'pending').length;
          const approved = data.filter(c => c.approval_status === 'approved').length;
          const rejected = data.filter(c => c.approval_status === 'rejected').length;

          document.getElementById('totalCampaigns').textContent = total;
          document.getElementById('pendingCampaigns').textContent = pending;
          document.getElementById('approvedCampaigns').textContent = approved;
          document.getElementById('rejectedCampaigns').textContent = rejected;
        } catch (err) {
          console.error('통계 로드 실패:', err);
        }
      },

      async loadCampaigns() {
        try {
          const { data, error } = await SupabaseDB.client
            .from('candidates')
            .select('*')
            .order('created_at', { ascending: false });

          if (error) throw error;

          const container = document.getElementById('campaignsList');

          if (!data || data.length === 0) {
            container.innerHTML = '<div class="empty-state">등록된 캠프가 없습니다.</div>';
            return;
          }

          container.innerHTML = data.map(campaign => {
            const status = campaign.approval_status || 'pending';
            const statusClass = `status-${status}`;
            const statusText = {
              'pending': '⏳ 대기 중',
              'approved': '✅ 승인됨',
              'rejected': '❌ 거부됨'
            }[status] || '⏳ 대기 중';

            return `
              <div class="campaign-item">
                <div class="campaign-info">
                  <div class="campaign-name">${campaign.name}</div>
                  <div class="campaign-meta">
                    등록: ${new Date(campaign.created_at).toLocaleDateString('ko-KR')} |
                    지역: ${campaign.region || '미지정'} |
                    정당: ${campaign.party || '미지정'}
                  </div>
                </div>
                <div>
                  <span class="status-badge ${statusClass}">${statusText}</span>
                  ${status === 'pending' ? `
                    <div class="action-buttons">
                      <button class="btn-action btn-approve" onclick="AdminDashboard.approveCampaign('${campaign.id}')">✅ 승인</button>
                      <button class="btn-action btn-reject" onclick="AdminDashboard.rejectCampaign('${campaign.id}')">❌ 거부</button>
                    </div>
                  ` : ''}
                </div>
              </div>
            `;
          }).join('');
        } catch (err) {
          console.error('캠프 로드 실패:', err);
        }
      },

      async approveCampaign(campaignId) {
        const admin = AdminAuth.getCurrentAdmin();
        try {
          const { error } = await SupabaseDB.client
            .from('candidates')
            .update({
              approval_status: 'approved',
              approved_by: admin.adminId,
              approved_at: new Date().toISOString()
            })
            .eq('id', campaignId);

          if (error) throw error;

          alert('✅ 캠프가 승인되었습니다.');
          this.loadCampaigns();
          this.loadStatistics();
        } catch (err) {
          alert('❌ 오류: ' + err.message);
        }
      },

      async rejectCampaign(campaignId) {
        const reason = prompt('거부 사유를 입력해주세요:');
        if (!reason) return;

        const admin = AdminAuth.getCurrentAdmin();
        try {
          const { error } = await SupabaseDB.client
            .from('candidates')
            .update({
              approval_status: 'rejected',
              approved_by: admin.adminId,
              approval_reason: reason,
              approved_at: new Date().toISOString()
            })
            .eq('id', campaignId);

          if (error) throw error;

          alert('❌ 캠프가 거부되었습니다.');
          this.loadCampaigns();
          this.loadStatistics();
        } catch (err) {
          alert('❌ 오류: ' + err.message);
        }
      },

      logout() {
        AdminAuth.logout();
        window.location.href = '/pages/admin-login.html';
      }
    };

    AdminDashboard.init();
  </script>
</body>
</html>
